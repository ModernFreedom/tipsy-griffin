function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);

  cv.style.width=(W*scale)+'px'; cv.style.height=(H*scale)+'px';
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.imageSmoothingEnabled=true;
}
addEventListener('resize',resize); resize();

// ============================ TEXTURE ============================
function srnd(){ srnd._s=(srnd._s*1664525+1013904223)>>>0; return srnd._s/4294967296; } srnd._s=987654321;
let noiseCanvas=null, noisePat=null;
function noiseOverlay(x,y,w,h,alpha,comp){
  if(!noiseCanvas){ noiseCanvas=document.createElement('canvas'); noiseCanvas.width=150; noiseCanvas.height=150;
    const n=noiseCanvas.getContext('2d'), img=n.createImageData(150,150);
    for(let i=0;i<img.data.length;i+=4){ const v=Math.floor(110+Math.random()*140); img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=255; }
    n.putImageData(img,0,0); noisePat=ctx.createPattern(noiseCanvas,'repeat'); }
  ctx.save(); ctx.globalAlpha=alpha; ctx.globalCompositeOperation=comp||'overlay'; ctx.fillStyle=noisePat; ctx.fillRect(x,y,w,h); ctx.restore();
}

// ---- Octopath/HD-2D post-processing: tilt-shift DoF + bloom + vignette ----
let fxBuf,fxCtx,fxBuf2,fxCtx2;
function ensureFX(sw,sh){ if(!fxBuf||fxBuf.width!==sw||fxBuf.height!==sh){
  fxBuf=document.createElement('canvas'); fxBuf.width=sw; fxBuf.height=sh; fxCtx=fxBuf.getContext('2d');
  fxBuf2=document.createElement('canvas'); fxBuf2.width=sw; fxBuf2.height=sh; fxCtx2=fxBuf2.getContext('2d'); } }
function postFX(){
  const w=cv.width,h=cv.height, sw=Math.max(2,w>>1), sh=Math.max(2,h>>1);
  ensureFX(sw,sh);
  // half-res blurred copy of the frame
  fxCtx.setTransform(1,0,0,1,0,0); fxCtx.globalCompositeOperation='source-over'; fxCtx.clearRect(0,0,sw,sh);
  fxCtx.filter='blur('+Math.max(2,Math.round(3*DPR))+'px)'; fxCtx.drawImage(cv,0,0,w,h,0,0,sw,sh); fxCtx.filter='none';
  // mask that blur to the top & bottom bands (tilt-shift)
  fxCtx2.setTransform(1,0,0,1,0,0); fxCtx2.globalCompositeOperation='source-over'; fxCtx2.clearRect(0,0,sw,sh); fxCtx2.drawImage(fxBuf,0,0);
  fxCtx2.globalCompositeOperation='destination-in';
  const g=fxCtx2.createLinearGradient(0,0,0,sh); g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(0.27,'rgba(0,0,0,0)'); g.addColorStop(0.73,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,1)');
  fxCtx2.fillStyle=g; fxCtx2.fillRect(0,0,sw,sh); fxCtx2.globalCompositeOperation='source-over';
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=true;
  ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.13; ctx.drawImage(fxBuf,0,0,sw,sh,0,0,w,h);   // bloom
  ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1; ctx.drawImage(fxBuf2,0,0,sw,sh,0,0,w,h); // DoF edges
  const vg=ctx.createRadialGradient(w/2,h*0.46,h*0.36,w/2,h*0.5,h*0.96); vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(8,6,18,0.30)'); ctx.fillStyle=vg; ctx.fillRect(0,0,w,h);
  ctx.restore();
}
const motes=[]; for(let i=0;i<48;i++) motes.push({x:srnd()*W,y:srnd()*H,r:0.6+srnd()*1.9,sp:8+srnd()*22,ph:srnd()*6.28});
function drawMotes(time){
  const warm=(state.scene==='island'||state.scene==='tavern'||state.scene==='airport');
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const m of motes){ const yy=((m.y - time*0.004*m.sp)%H+H)%H, x=m.x+Math.sin(time*0.0006+m.ph)*16;

    ctx.fillStyle=warm?'rgba(255,238,196,1)':'rgba(216,232,255,1)';
    ctx.beginPath(); ctx.arc(x,yy,m.r,0,7); ctx.fill(); }
  ctx.restore();
}

function advanceDialogue(){
  if(dlg.shown<dlg.target.length){ dlg.shown=dlg.target.length; return; }
  dlg.idx++;
  if(dlg.idx>=dlg.npc.lines.length){ dlg.active=false; dlg.npc=null; }
  else { dlg.target=dlg.npc.lines[dlg.idx]; dlg.shown=0; }
}

// ============================ COLLISION ============================
function circleRect(cx,cy,r,R){ const nx=Math.max(R.x,Math.min(cx,R.x+R.w)),ny=Math.max(R.y,Math.min(cy,R.y+R.h));
  const dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<r*r; }
function people(){ if(state.scene==='tavern')return npcs; if(state.scene==='lake')return lakeFolk; if(state.scene==='airport')return airportFolk; if(state.scene==='jungle')return jungleFolk; if(STREETS[state.scene])return STREETS[state.scene].folk; return []; }
function blocked(cx,cy,r){
  for(const s of SCENES[state.scene].solids){ if(circleRect(cx,cy,r,s)) return true; }
  for(const n of people()){ if((cx-n.x)**2+(cy-n.y)**2<(r+13)**2) return true; }
  for(const v of vehInScene()){ if(v.kind==='boat') continue; if(v!==driving && circleRect(cx,cy,r,{x:v.x-VEH[v.kind].w/2,y:v.y-12,w:VEH[v.kind].w,h:VEH[v.kind].h})) return true; }
  if(state.scene==='dungeon' && !dungeonBoxer.defeated && circleRect(cx,cy,r,{x:dungeonBoxer.x-26,y:dungeonBoxer.y-18,w:52,h:50})) return true;
  return false;
}

function nearestInteractable(){

}

// ============================ TRANSITION ============================
function go(scene,spawn){ if(fade.dir)return; fade.dir=1; fade.pending={scene,spawn}; }
function vehGo(v,scene,x){ if(fade.dir)return; fade.dir=1; fade.pending={scene,veh:v,vehX:x}; }
function updateVehicle(v,dt){
  player.near=null; const P=VEH[v.kind];
  let ax=0,ay=0;
  if(keys['a']||keys['arrowleft'])ax--; if(keys['d']||keys['arrowright'])ax++;
  if(keys['w']||keys['arrowup'])ay--; if(keys['s']||keys['arrowdown'])ay++;
  v.vx+=ax*P.accel*dt; v.vy+=ay*P.accel*dt;
  v.vx*=P.fric; v.vy*=(v.kind==='boat'?P.fric:P.fric-0.03);
  const sp=Math.hypot(v.vx,v.vy); if(sp>P.max){ v.vx*=P.max/sp; v.vy*=P.max/sp; }
  v.x+=v.vx*dt; v.y+=v.vy*dt;
  if(Math.abs(v.vx)>6) v.facing=v.vx<0?'left':'right';
  if(v.kind==='boat' && sp>10) v.angle=Math.atan2(v.vy,v.vx);
  if(state.scene==='lake'){
    const wb=LAKE.water;
    if(v.kind==='boat' && !fade.dir && v.x<=wb.x0+3){ v.x=LAKE.dock.x; v.y=LAKE.dock.y; v.vx=v.vy=0; v.angle=-Math.PI/2; driving=null; go('airport',{x:W-160,y:520,dir:'left'}); return; }
    v.x=Math.max(wb.x0,Math.min(wb.x1,v.x)); v.y=Math.max(wb.y0,Math.min(wb.y1,v.y));
  } else if(state.scene==='island'){
    if(onSand(v.x,v.y)){ const a=Math.atan2(v.y-364,v.x-W/2); v.x+=Math.cos(a)*5; v.y+=Math.sin(a)*5; v.vx*=0.5; v.vy*=0.5; } // dinghy stays in the water
    v.x=Math.max(40,Math.min(W-40,v.x)); v.y=Math.max(200,Math.min(H-34,v.y));
  } else {
    const c=STREETS[state.scene];
    v.y=Math.max(322,Math.min(H-52,v.y));
    if(!fade.dir && v.x>W-30 && c.next) vehGo(v,c.next,-10);
    else if(!fade.dir && v.x<30 && c.prev) vehGo(v,c.prev,W+10);
    else if(!fade.dir && v.x<34 && c.westExit){ v.vx=v.vy=0; driving=null; go(c.westExit,{x:LAKE.dock.x,y:SCENES.lake.bounds.y0+8,dir:'up'}); return; }
    if(v.x<46 && !c.prev && !c.westExit){ v.x=46; v.vx=0; }
    if(v.x>W-46 && !c.next){ v.x=W-46; v.vx=0; }
  }
  if(interact){ interact=false;
    if(v.kind==='boat' && state.scene==='lake'){ v.x=LAKE.dock.x; v.y=LAKE.dock.y; v.vx=v.vy=0; v.angle=-Math.PI/2; player.x=LAKE.dock.x; player.y=SCENES.lake.bounds.y0+8; player.dir='up'; }
    else if(v.kind==='boat' && state.scene==='island'){ v.vx=v.vy=0; player.x=v.x; player.y=Math.min(SCENES.island.bounds.y1,v.y+6); player.dir='down'; }
    else { const b=SCENES[state.scene].bounds; player.x=Math.max(b.x0,Math.min(b.x1,v.x)); player.y=Math.max(b.y0,Math.min(b.y1,v.y+48)); player.dir='down'; }
    player.moving=false; driving=null; }
}
function boardPlane(){ if(fade.dir)return; fade.dir=1; fade.pending={board:true}; }
function updatePlane(dt){
  player.near=null;
  let turn=0; if(keys['a']||keys['arrowleft'])turn--; if(keys['d']||keys['arrowright'])turn++;
  plane.angle += turn*2.2*dt;
  let thr=0; if(keys['w']||keys['arrowup'])thr+=1; if(keys['s']||keys['arrowdown'])thr-=0.5;
  plane.vx += Math.cos(plane.angle)*thr*1300*dt; plane.vy += Math.sin(plane.angle)*thr*1300*dt;
  plane.vx*=0.99; plane.vy*=0.99;
  const mx=920, s=Math.hypot(plane.vx,plane.vy); if(s>mx){ plane.vx*=mx/s; plane.vy*=mx/s; }
  plane.x+=plane.vx*dt; plane.y+=plane.vy*dt;
  plane.y=Math.max(50,Math.min(SKY_H-50,plane.y));
  if(!fade.dir && plane.x<70){ fade.dir=1; fade.pending={island:true}; return; }   // fly west → island
  plane.x=Math.max(50,Math.min(SKY_W-50,plane.x));
  if(interact){ interact=false; if(!fade.dir){ fade.dir=1; fade.pending={land:true}; } }
}

// ============================ UPDATE ============================
let last=performance.now();
function update(dt){
  // fade
  if(fade.dir){
    fade.a+=fade.dir*dt*3.2;
    if(fade.a>=1&&fade.pending){ const p=fade.pending;
      if(p.board){ state.scene='sky'; plane.scene='sky'; plane.x=SKY_W/2; plane.y=SKY_H-260; plane.vx=plane.vy=0; plane.angle=-Math.PI/2; driving=plane;
        cam.x=Math.max(0,Math.min(SKY_W-W,plane.x-W/2)); cam.y=Math.max(0,Math.min(SKY_H-H,plane.y-H/2)); }
      else if(p.land){ state.scene='airport'; plane.scene='airport'; plane.x=540; plane.y=430; plane.vx=plane.vy=0; plane.angle=0; driving=null; player.x=540; player.y=520; player.dir='down'; }
      else if(p.island){ state.scene='island'; plane.scene='island'; plane.x=W/2; plane.y=360; plane.vx=plane.vy=0; plane.angle=0; driving=null; player.x=W/2-70; player.y=430; player.dir='right'; }
      else { state.scene=p.scene;
        if('veh' in p){ p.veh.scene=p.scene; p.veh.x=p.vehX; } // driving across — keep player in vehicle
        else { player.x=p.spawn.x; player.y=p.spawn.y; player.dir=p.spawn.dir||'down'; } }
      fade.pending=null; fade.dir=-1; titleEl.textContent=NAMES[state.scene][0]; subEl.innerHTML=NAMES[state.scene][1]; }
    if(fade.a<=0){ fade.a=0; fade.dir=0; }
  }
  if(state.scene==='island') updateIsland(dt);   // sharks cruise (and bite swimmers) even while idle/boating

  if(pool&&pool.active){ updatePool(dt); if(interact){ interact=false; pool.active=false; } return; }

  if(dlg.active){ player.moving=false; player.anim=0;
    if(interact){ interact=false; advanceDialogue(); }
    if(dlg.shown<dlg.target.length) dlg.shown=Math.min(dlg.target.length, dlg.shown+dt*55);
    return; }

  if(bank&&bank.active){ player.near=null; player.moving=false; if(interact){interact=false; bank.active=false;} return; }
  if(box&&box.active){ player.near=null; player.moving=false; interact=false; updateBox(dt); return; }

  if(driving){ if(driving.kind==='plane') updatePlane(dt); else updateVehicle(driving,dt); return; }

  // enemies wander (decorative)
  if(state.scene==='dungeon'){ dungeonEnemies.forEach(e=>{ e.ph+=dt*2; e.x+=Math.sin(e.ph)*0.5; e.y+=Math.cos(e.ph*0.7)*0.3; }); }

  let ix=0,iy=0;
  if(keys['w']||keys['arrowup'])iy--; if(keys['s']||keys['arrowdown'])iy++;
  if(keys['a']||keys['arrowleft'])ix--; if(keys['d']||keys['arrowright'])ix++;
  player.moving=(ix||iy)!==0;
  if(player.moving){
    const l=Math.hypot(ix,iy)||1; ix/=l; iy/=l;
    let sp=player.speed*(keys['shift']?1.8:1)*dt;   // px this frame (speed is px/sec)
    if(state.scene==='island' && !onSand(player.x,player.y)) sp*=0.6;   // slower while swimming
    if(Math.abs(iy)>=Math.abs(ix)) player.dir=iy<0?'up':'down'; else player.dir=ix<0?'left':'right';
    const stuck=blocked(player.x,player.y,player.r);   // if somehow inside a solid, let them walk free to escape
    const nx=player.x+ix*sp; if(stuck||!blocked(nx,player.y,player.r)) player.x=nx;
    const ny=player.y+iy*sp; if(stuck||!blocked(player.x,ny,player.r)) player.y=ny;
    player.anim+=sp*0.05;
  } else player.anim=0;

  const b=SCENES[state.scene].bounds;
  player.x=Math.max(b.x0,Math.min(b.x1,player.x));
  player.y=Math.max(b.y0,Math.min(b.y1,player.y));
  const ec=STREETS[state.scene];   // walk off the west edge → special exit (e.g. the lake)
  if(ec && ec.westExit && !fade.dir && player.x<=b.x0+2){ go(ec.westExit,{x:LAKE.dock.x,y:SCENES.lake.bounds.y0+8,dir:'up'}); }

  const near=nearestInteractable(); player.near=near;
  if(interact){ interact=false; if(near) near.act(); }
}

const BALLR=11, RAIL=28, POCR=20;
function startPool(){
  const pw=640, ph=360, x=(W-pw)/2, y=(H-ph)/2-6;
  pool={active:true,x,y,w:pw,h:ph,balls:[],aiming:false,am:null,potted:[],msg:''};
  const L=x+RAIL,R=x+pw-RAIL,Tp=y+RAIL,B=y+ph-RAIL;
  pool.inner={L,R,T:Tp,B};
  pool.pockets=[{x:L,y:Tp},{x:x+pw/2,y:Tp},{x:R,y:Tp},{x:L,y:B},{x:x+pw/2,y:B},{x:R,y:B}];
  // cue ball
  pool.balls.push({x:L+(R-L)*0.25,y:(Tp+B)/2,vx:0,vy:0,r:BALLR,cue:true,col:'#f4f1e8',n:0});
  // 9-ball diamond rack
  const cols=['#e8c84a','#2a5ad8','#d83a3a','#7a3ad8','#e8842a','#2a9a4a','#7a2a2a','#1a1a1a','#e8c84a'];
  const cx=L+(R-L)*0.72, cy=(Tp+B)/2, d=BALLR*2+1, layout=[[0,0],[1,-1],[1,1],[2,-2],[2,0],[2,2],[3,-1],[3,1],[4,0]];
  let n=1; for(const [c,row] of layout){ pool.balls.push({x:cx+c*d*0.88,y:cy+row*d*0.5,vx:0,vy:0,r:BALLR,col:cols[n-1],n,stripe:n===9}); n++; }
}
function poolStopped(){ return pool.balls.every(b=>Math.hypot(b.vx,b.vy)<0.08); }
function poolShoot(){
  const cue=pool.balls.find(b=>b.cue); if(!cue||!pool.am) return;
  let dx=cue.x-pool.am.x, dy=cue.y-pool.am.y; const dist=Math.hypot(dx,dy); if(dist<4) return;
  const power=Math.min(dist,190), sp=power*0.16; dx/=dist; dy/=dist;
  cue.vx=dx*sp; cue.vy=dy*sp;
}
function updatePool(dt){
  const I=pool.inner;
  for(let s=0;s<2;s++){ // substeps for stability
    for(const b of pool.balls){
      if(b.potted) continue;
      b.x+=b.vx; b.y+=b.vy; b.vx*=0.992; b.vy*=0.992;
      if(Math.abs(b.vx)<0.04)b.vx=0; if(Math.abs(b.vy)<0.04)b.vy=0;
      // cushions
      if(b.x-b.r<I.L){b.x=I.L+b.r;b.vx*=-0.9;} if(b.x+b.r>I.R){b.x=I.R-b.r;b.vx*=-0.9;}
      if(b.y-b.r<I.T){b.y=I.T+b.r;b.vy*=-0.9;} if(b.y+b.r>I.B){b.y=I.B-b.r;b.vy*=-0.9;}
    }
    // ball-ball
    for(let i=0;i<pool.balls.length;i++)for(let j=i+1;j<pool.balls.length;j++){
      const a=pool.balls[i],c=pool.balls[j]; if(a.potted||c.potted)continue;
      let dx=c.x-a.x,dy=c.y-a.y,dist=Math.hypot(dx,dy),min=a.r+c.r;
      if(dist>0&&dist<min){ const nx=dx/dist,ny=dy/dist,ov=(min-dist)/2;
        a.x-=nx*ov; a.y-=ny*ov; c.x+=nx*ov; c.y+=ny*ov;
        const van=a.vx*nx+a.vy*ny, vcn=c.vx*nx+c.vy*ny;
        a.vx+=(vcn-van)*nx; a.vy+=(vcn-van)*ny; c.vx+=(van-vcn)*nx; c.vy+=(van-vcn)*ny;
      }
    }
    // pockets
    for(const b of pool.balls){ if(b.potted)continue;
      for(const p of pool.pockets){ if((b.x-p.x)**2+(b.y-p.y)**2<POCR*POCR){
        if(b.cue){ b.x=pool.inner.L+(pool.inner.R-pool.inner.L)*0.25; b.y=(pool.inner.T+pool.inner.B)/2; b.vx=0; b.vy=0; }
        else { b.potted=true; b.vx=b.vy=0; pool.potted.push(b.n); }
      }}
    }
  }
  if(pool.balls.filter(b=>!b.cue&&!b.potted).length===0) pool.msg='You cleared the table!  (E to leave)';
}

function draw(time){
  ctx.clearRect(0,0,W,H);
  if(state.scene==='tavern') drawTavern(time); else if(state.scene==='dungeon') drawDungeon(time);
  else if(state.scene==='lake') drawLake(time);
  else if(state.scene==='airport') drawAirport(time);
  else if(state.scene==='sky') drawSky(time);
  else if(state.scene==='island') drawIsland(time);
  else if(state.scene==='jungle') drawJungle(time);
  else drawOutdoor(state.scene,time);
  const modal=(pool&&pool.active)||(bank&&bank.active)||(box&&box.active);
  if(!modal) drawMotes(time);
  if(driving) drawDriveHint();
  drawCoins();
  if(pool&&pool.active) drawPool(time);
  if(bank&&bank.active) drawBank(time);
  if(box&&box.active) drawBox(time);
  drawDialogue();
  // fade overlay
  if(fade.a>0){ ctx.fillStyle=`rgba(0,0,0,${fade.a})`; ctx.fillRect(0,0,W,H); }
  requestAnimationFrame(loop);
}

function rr(x,y,w,h,r){ if(r==null)r=4; ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawTavern(time){
  drawBackWall(time); drawFloor(); drawRugs(); drawSideWalls(); drawFrontExit();
  drawBar(time); drawShelf();
  tavernBarrels.forEach(b=>drawBarrel(b.x,b.y));
  tavernPlants.forEach(p=>drawPlant(p.x,p.y,p.big));
  drawPoolTableMini(time);
  const ents=[];
  ents.push({y:ROUND.y+ROUND.r,fn:()=>drawRoundTable(ROUND.x,ROUND.y,time)});
  npcs.forEach(n=>ents.push({y:n.y,fn:()=>drawCharacter(n.x,n.y,n.facing||'down',n.pal,0)}));
  ents.push({y:player.y,fn:()=>drawCharacter(player.x,player.y,player.dir,'hero',player.moving?player.anim:0)});
  ents.sort((a,b)=>a.y-b.y); ents.forEach(e=>e.fn());
  drawChandelier(time);
  tavernLighting(time); colorGrade('rgba(255,160,60,0.16)');
  drawPrompt();
}

function openBank(){ bank={active:true,sel:null,stake:Math.min(20,Math.max(10,Math.floor(player.coins/10)*10||10)),msg:'Pick a match and outcome, then place your bet.',hits:[]}; }
function placeBet(){
  if(!bank.sel){ bank.msg='Pick an outcome first.'; return; }
  const m=matches[bank.sel.m]; if(m.played){ bank.msg='That match already finished.'; bank.sel=null; return; }
  if(bank.stake>player.coins){ bank.msg='Not enough coins for that stake.'; return; }
  player.coins-=bank.stake;
  bets.push({m:bank.sel.m,pick:bank.sel.pick,odds:bank.sel.odds,stake:bank.stake,status:'pending',payout:0});
  bank.msg='Bet placed: 🪙'+bank.stake+' on '+(bank.sel.pick==='D'?'the Draw':(bank.sel.pick==='H'?m.h:m.a))+'.';
  bank.sel=null; bank.stake=Math.min(bank.stake,player.coins)||10;
}
function simMatch(m){ const ph=1/m.oh,pd=1/m.od,pa=1/m.oa,s=ph+pd+pa,r=Math.random()*s;
  const pick=r<ph?'H':r<ph+pd?'D':'A'; let hg,ag;
  if(pick==='H'){ hg=1+Math.floor(Math.random()*3); ag=Math.floor(Math.random()*hg); }
  else if(pick==='A'){ ag=1+Math.floor(Math.random()*3); hg=Math.floor(Math.random()*ag); }
  else { hg=Math.floor(Math.random()*3); ag=hg; }
  return {pick,txt:m.hf+hg+'–'+ag+m.af}; }
function settleBets(){
  matches.forEach((m,i)=>{ if(!m.played && bets.some(b=>b.m===i&&b.status==='pending')){ m.result=simMatch(m); m.played=true; } });
  let net=0,won=0;
  bets.forEach(b=>{ if(b.status!=='pending')return; const m=matches[b.m]; if(!m.played)return;
    if(m.result.pick===b.pick){ b.status='won'; b.payout=Math.round(b.stake*b.odds); player.coins+=b.payout; net+=b.payout; won++; }
    else b.status='lost'; });

// ---------- BOXING MATCH (old-school pop-up brawl) ----------
function openBox(){ box={active:true,pHP:100,bHP:120,pState:'ready',pTimer:0,lean:0,move:null,struck:false,
  bPhase:'idle',bTimer:0.9,pHit:false,round:0,bFlash:0,pFlash:0,shake:0,over:false,won:false,msg:''}; }
function boxKey(k){
  if(box.over){ if(k==='e'||k===' '||k==='escape') box.active=false; return; }
  if(k==='escape'){ box.active=false; return; }
  if(box.pState!=='ready') return;
  if(k==='a'||k==='arrowleft'){ box.pState='dodge'; box.pTimer=0.4; box.lean=-1; }
  else if(k==='d'||k==='arrowright'){ box.pState='dodge'; box.pTimer=0.4; box.lean=1; }
  else if(k==='j'){ box.pState='attack'; box.pTimer=0.3; box.move='jab'; box.struck=false; }
  else if(k==='k'){ box.pState='attack'; box.pTimer=0.52; box.move='hook'; box.struck=false; }
}
function updateBox(dt){
  if(box.over) return;
  if(box.pState==='attack'){
    box.pTimer-=dt; const strikeAt=box.move==='hook'?0.26:0.13;
    if(!box.struck && box.pTimer<=strikeAt){ box.struck=true;
      let dmg=box.move==='hook'?16:7;
      if(box.bPhase==='open'||box.bPhase==='windup') dmg=Math.round(dmg*1.8); // clean hit while he's not guarding
      box.bHP=Math.max(0,box.bHP-dmg); box.bFlash=0.18;
      if(box.bHP<=0){ box.over=true; box.won=true; box.msg='Brute hits the canvas — you earned 100 coins!'; dungeonBoxer.defeated=true; player.coins+=100; }
    }
    if(box.pTimer<=0) box.pState='ready';
  } else if(box.pState==='dodge'){ box.pTimer-=dt; if(box.pTimer<=0){ box.pState='ready'; box.lean=0; } }
  box.bTimer-=dt;
  if(box.bTimer<=0){
    if(box.bPhase==='idle'){ box.bPhase='windup'; box.bTimer=Math.max(0.32,0.62-box.round*0.02); }
    else if(box.bPhase==='windup'){ box.bPhase='punch'; box.bTimer=0.26; box.pHit=false; }
    else if(box.bPhase==='punch'){ box.bPhase='open'; box.bTimer=0.7; }
    else { box.bPhase='idle'; box.bTimer=0.4+Math.random()*0.5; box.round++; }
  }
  if(box.bPhase==='punch' && !box.pHit && box.bTimer<=0.14){ box.pHit=true;
    if(box.pState==='dodge'){ box.bPhase='open'; box.bTimer=0.85; }   // whiffed → big opening
    else { box.pHP=Math.max(0,box.pHP-11); box.pFlash=0.2; box.shake=0.28;
      if(box.pHP<=0){ box.over=true; box.won=false; box.msg='Down for the count...'; } }
  }
  box.bFlash=Math.max(0,box.bFlash-dt); box.pFlash=Math.max(0,box.pFlash-dt); box.shake=Math.max(0,box.shake-dt);
}

function drawLeg(x,sw,p){ ctx.fillStyle=p.leg; ctx.fillRect(x,6,6,11);
  ctx.fillStyle=p.leg2; ctx.fillRect(x+4,6,2,11);
  ctx.fillStyle=p.boot; ctx.fillRect(x-1,15+Math.max(0,sw),7,5); }
function drawArm(x,p){ ctx.fillStyle=p.top2; ctx.fillRect(x,-7,4,4); ctx.fillStyle=p.top; ctx.fillRect(x,-4,4,9); ctx.fillStyle=p.skin; ctx.fillRect(x,5,4,4); }
function drawCharacter(x,y,dir,palKey,anim){
  const p=PAL[palKey]||PAL.hero;
  ctx.save(); ctx.translate(Math.round(x),Math.round(y)); ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='rgba(0,0,0,.32)'; ctx.beginPath(); ctx.ellipse(0,22,15,5.5,0,0,7); ctx.fill();
  const sw=Math.sin(anim)*4.5, bob=Math.abs(Math.sin(anim))*1.4;
  ctx.translate(0,-bob);
  // legs + boots
  drawLeg(-6,sw,p); drawLeg(2,-sw,p);
  // arms (behind body edges)
  drawArm(-13,p); drawArm(9,p);
  // torso
  const tg=ctx.createLinearGradient(-11,-9,9,10); tg.addColorStop(0,p.top); tg.addColorStop(1,p.top2);
  ctx.fillStyle=tg; rr(-11,-9,22,19,6); ctx.fill();
  ctx.fillStyle=p.top2; rr(4,-9,7,19,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.13)'; rr(-11,-9,4,19,5); ctx.fill();
  ctx.fillStyle=p.sk2; ctx.fillRect(-4,-9,8,3);          // collar
  ctx.fillStyle='#3a2410'; ctx.fillRect(-11,6,22,4); ctx.fillStyle=p.trim; ctx.fillRect(-3,5,6,5); // belt
  // head
  ctx.fillStyle=p.skin; rr(-8,-26,16,18,7); ctx.fill();
  ctx.fillStyle=p.sk2; rr(3,-26,5,18,6); ctx.fill();
  ctx.fillStyle=p.skin; if(dir!=='left') ctx.fillRect(7,-18,2,4); if(dir!=='right') ctx.fillRect(-9,-18,2,4);
  // hair
  ctx.fillStyle=p.hair; if(dir==='up'){ rr(-9,-28,18,16,7); ctx.fill(); } else { rr(-9,-28,18,10,7); ctx.fill();
    if(dir!=='left') ctx.fillRect(6,-22,3,7); if(dir!=='right') ctx.fillRect(-9,-22,3,7); }
  // face
  if(dir!=='up'){ ctx.fillStyle='#241a12';
    if(dir==='left'){ ctx.fillRect(-5,-19,2,3); }
    else if(dir==='right'){ ctx.fillRect(3,-19,2,3); }
    else { ctx.fillRect(-5,-19,2,3); ctx.fillRect(3,-19,2,3);
      ctx.fillStyle='rgba(40,24,12,.55)'; ctx.fillRect(-6,-21,4,1); ctx.fillRect(2,-21,4,1);
      ctx.strokeStyle='#a8704a'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,-13,3,0.25,Math.PI-0.25); ctx.stroke(); } }
  // class gear
  if(p.cls==='knight') drawKnightKit(dir);
  else if(p.cls==='bard') drawBardKit(dir);
  else if(p.cls==='innkeep') drawApron();
  else if(p.cls==='hero') drawHeroKit();
  ctx.restore();
}
function drawHeroKit(){ ctx.fillStyle='#e8c84a'; ctx.fillRect(-9,-22,18,2);            // headband
  ctx.strokeStyle='#cfd4d8'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(7,-5); ctx.lineTo(13,-21); ctx.stroke(); // sword
  ctx.fillStyle='#7a5a2c'; ctx.fillRect(5,-6,5,3); }
function drawKnightKit(dir){ ctx.fillStyle='#aeb4c4'; rr(-9,-28,18,13,6); ctx.fill();
  ctx.fillStyle='#8a90a4'; rr(3,-28,6,13,5); ctx.fill();
  if(dir!=='up'){ ctx.fillStyle='#1a1d24'; ctx.fillRect(-7,-21,14,3); }
  ctx.fillStyle='#b03a3a'; rr(-3,-35,6,9,3); ctx.fill();                                  // plume
  ctx.fillStyle='#c9d0e0'; ctx.beginPath(); ctx.arc(-11,-5,4,0,7); ctx.arc(11,-5,4,0,7); ctx.fill(); } // pauldrons
function drawBardKit(dir){ ctx.fillStyle='#2f6b8a'; rr(-10,-31,20,9,5); ctx.fill();
  ctx.fillStyle='#1f5066'; rr(-10,-26,20,3,2); ctx.fill();
  ctx.fillStyle='#e8c84a'; ctx.beginPath(); ctx.moveTo(8,-31); ctx.lineTo(17,-37); ctx.lineTo(10,-29); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#8a5a2c'; ctx.beginPath(); ctx.ellipse(11,2,5,7,0.4,0,7); ctx.fill();
  ctx.strokeStyle='#5a3a1c'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(13,-3); ctx.lineTo(17,-14); ctx.stroke(); }
function drawApron(){ ctx.fillStyle='#cdbfa0'; rr(-8,-3,16,13,3); ctx.fill();
  ctx.fillStyle='#b8a982'; ctx.fillRect(-8,-3,16,2); ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(-1,-3,2,13); }

// ---------- LIGHTING ----------
let lc=null,lx=null;
function lightLayer(){ if(!lc){lc=document.createElement('canvas'); lc.width=W; lc.height=H; lx=lc.getContext('2d');} return lx; }
function applyLights(base, lights, time){
  const x=lightLayer(); x.clearRect(0,0,W,H); x.fillStyle=base; x.fillRect(0,0,W,H); x.globalCompositeOperation='destination-out';
  for(const L of lights){ const r=L.r*(0.94+Math.sin(time*0.004+L.x)*0.05), g=x.createRadialGradient(L.x,L.y,0,L.x,L.y,r);
    g.addColorStop(0,`rgba(0,0,0,${L.s})`); g.addColorStop(.6,`rgba(0,0,0,${L.s*0.5})`); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.beginPath(); x.arc(L.x,L.y,r,0,7); x.fill(); }
  x.globalCompositeOperation='source-over'; ctx.drawImage(lc,0,0);
}
function tavernLighting(time){
  applyLights('rgba(18,10,28,0.46)',[
    {x:W*0.30,y:70,r:230,s:1},{x:205,y:286,r:150,s:.8},{x:ROUND.x,y:ROUND.y-10,r:150,s:.9},
    {x:205,y:104,r:200,s:.7},{x:1035,y:104,r:200,s:.7},
    {x:ATM.x+ATM.w/2,y:ATM.y+40,r:120,s:.6},
    {x:POOLTABLE.x+POOLTABLE.w/2,y:POOLTABLE.y+POOLTABLE.h/2,r:130,s:.6},{x:player.x,y:player.y-6,r:120,s:.85},
  ],time);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const wx of [205,1035]){ const g=ctx.createLinearGradient(wx,FLOOR_TOP-40,wx-120,H);
    g.addColorStop(0,'rgba(255,235,180,.10)'); g.addColorStop(1,'rgba(255,235,180,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(wx-30,80); ctx.lineTo(wx+30,80); ctx.lineTo(wx-90,H); ctx.lineTo(wx-220,H); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}
function dungeonLighting(time){
  const lights=dungeonTorches.map(t=>({x:t.x,y:t.y,r:150,s:.95}));
  lights.push({x:player.x,y:player.y-6,r:130,s:.9});
  lights.push({x:dungeonChest.x,y:dungeonChest.y,r:110,s:.5});
  applyLights('rgba(6,8,16,0.72)',lights,time);
}
function colorGrade(tint){ ctx.save(); ctx.globalCompositeOperation='soft-light'; ctx.fillStyle=tint; ctx.fillRect(0,0,W,H); ctx.restore();
  const v=ctx.createRadialGradient(W/2,H*0.45,H*0.3,W/2,H*0.5,H*0.92); v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.58)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H); }

// ---------- PROMPT ----------
function drawPrompt(){
  if(dlg.active||(pool&&pool.active)||driving) return;
  const it=player.near; if(!it) return;
  const x=it.x, y=Math.max(FLOOR_TOP+10, it.y-46);
  ctx.save(); ctx.font='bold 13px Georgia,serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const w=ctx.measureText(it.label).width+16;
  ctx.fillStyle='rgba(20,12,6,.9)'; rr(x-w/2,y-10,w,20,6); ctx.fill(); ctx.strokeStyle='#caa24a'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#f3e3c4'; ctx.fillText(it.label,x,y);
  const by=y+16+Math.sin(performance.now()*0.006)*2;
  ctx.fillStyle='#caa24a'; rr(x-9,by-8,18,16,4); ctx.fill(); ctx.fillStyle='#1a120a'; ctx.fillText('E',x,by+1); ctx.restore();
}

// ---------- POOL RENDER ----------
function drawPool(time){
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
  const t=pool;
  ctx.fillStyle='#3a2010'; rr(t.x-22,t.y-22,t.w+44,t.h+44,18); ctx.fill();
  ctx.fillStyle='#5a3216'; rr(t.x-12,t.y-12,t.w+24,t.h+24,14); ctx.fill();
  const g=ctx.createLinearGradient(0,t.y,0,t.y+t.h); g.addColorStop(0,'#208a52'); g.addColorStop(1,'#156038');
  ctx.fillStyle=g; rr(t.x,t.y,t.w,t.h,8); ctx.fill();
  // rail markers
  ctx.fillStyle='rgba(255,255,255,.25)'; for(let i=1;i<8;i++){ ctx.beginPath(); ctx.arc(t.x+i*t.w/8,t.y+6,1.5,0,7); ctx.arc(t.x+i*t.w/8,t.y+t.h-6,1.5,0,7); ctx.fill(); }
  // pockets
  for(const p of t.pockets){ ctx.fillStyle='#0b0805'; ctx.beginPath(); ctx.arc(p.x,p.y,POCR,0,7); ctx.fill();
    ctx.strokeStyle='#241208'; ctx.lineWidth=3; ctx.stroke(); }
  // aim guide
  const cue=t.balls.find(b=>b.cue&&!b.potted);
  if(t.aiming&&t.am&&cue&&poolStopped()){ let dx=cue.x-t.am.x,dy=cue.y-t.am.y,d=Math.hypot(dx,dy)||1; dx/=d; dy/=d;
    const pw=Math.min(d,190);
    ctx.setLineDash([6,6]); ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cue.x,cue.y); ctx.lineTo(cue.x+dx*pw*1.6,cue.y+dy*pw*1.6); ctx.stroke(); ctx.setLineDash([]);
    // cue stick behind
    ctx.strokeStyle='#c89a5a'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(cue.x-dx*(18+pw),cue.y-dy*(18+pw)); ctx.lineTo(cue.x-dx*16,cue.y-dy*16); ctx.stroke();
    // power bar
    ctx.fillStyle='rgba(0,0,0,.5)'; rr(t.x,t.y+t.h+18,t.w,12,6); ctx.fill();
    ctx.fillStyle=`hsl(${120-pw/190*120},80%,50%)`; rr(t.x,t.y+t.h+18,t.w*(pw/190),12,6); ctx.fill();
  }
  // balls
  for(const b of t.balls){ if(b.potted)continue;
    ctx.fillStyle='rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(b.x+2,b.y+3,b.r,b.r*0.8,0,0,7); ctx.fill();
    const rg=ctx.createRadialGradient(b.x-b.r*0.4,b.y-b.r*0.4,1,b.x,b.y,b.r);
    rg.addColorStop(0,'#ffffff'); rg.addColorStop(.35,b.col); rg.addColorStop(1,shade(b.col));
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    if(!b.cue){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.45,0,7); ctx.fill();
      ctx.fillStyle='#111'; ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(b.n,b.x,b.y+0.5); }
  }
  // potted tray
  ctx.fillStyle='#f3e3c4'; ctx.font='14px Georgia,serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('Potted: '+(t.potted.join(' ')||'—'), t.x, t.y-32);
  // instructions / msg
  ctx.textAlign='center'; ctx.fillStyle='#e8d8b0'; ctx.font='15px Georgia,serif';
  ctx.fillText(t.msg||'Drag from the cue ball and release to shoot.  Press E or Esc to leave.', W/2, t.y+t.h+52);
}
function shade(hex){ const n=parseInt(hex.slice(1),16); const r=Math.max(0,(n>>16&255)-60),g=Math.max(0,(n>>8&255)-60),b=Math.max(0,(n&255)-60);
  return `rgb(${r},${g},${b})`; }

// ---------- DIALOGUE BOX ----------
function drawDialogue(){
  if(!dlg.active) return;
  const bx=70,bw=W-140,bh=132,by=H-bh-22;
  ctx.fillStyle='rgba(12,8,5,0.92)'; rr(bx,by,bw,bh,12); ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#caa24a'; rr(bx,by,bw,bh,12); ctx.stroke();
  ctx.lineWidth=1; ctx.strokeStyle='#6a4f24'; rr(bx+5,by+5,bw-10,bh-10,9); ctx.stroke();
  ctx.font='bold 16px Georgia,serif'; const nm=dlg.npc.name,nw=ctx.measureText(nm).width+28;
  ctx.fillStyle='#2a1c0e'; rr(bx+22,by-16,nw,30,8); ctx.fill(); ctx.strokeStyle='#caa24a'; ctx.lineWidth=2; rr(bx+22,by-16,nw,30,8); ctx.stroke();
  ctx.fillStyle='#e8b34a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(nm,bx+36,by);
  ctx.fillStyle='#f3e8d2'; ctx.font='20px "Iowan Old Style",Georgia,serif';
  wrapText(dlg.target.slice(0,Math.floor(dlg.shown)), bx+34, by+44, bw-68, 28);
  if(dlg.shown>=dlg.target.length){ const ay=by+bh-18+Math.sin(performance.now()*0.006)*3;
    ctx.fillStyle='#caa24a'; ctx.beginPath(); ctx.moveTo(bx+bw/2-7,ay); ctx.lineTo(bx+bw/2+7,ay); ctx.lineTo(bx+bw/2,ay+8); ctx.closePath(); ctx.fill(); }
}
function wrapText(text,x,y,maxW,lh){ const words=text.split(' '); let line='',yy=y;
  for(const w of words){ const test=line?line+' '+w:w; if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,x,yy); line=w; yy+=lh; } else line=test; }
  ctx.fillText(line,x,yy); }

function loop(time){ const dt=Math.min(0.05,(time-last)/1000); last=time; update(dt); draw(time); }
requestAnimationFrame(loop);
</script>
